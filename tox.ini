[tox]
isolated_build = True
envlist =
    py{311,312,313,314}-django{520}-wagtail{70,74}

[testenv]
runner = uv-venv-runner
allowlist_externals =
    bash
deps =
    django520: django>=5.2,<5.3
    wagtail70: wagtail>=7.0,<7.1
    wagtail74: wagtail>=7.4,<7.5
setenv =
    PYTHONWARNINGS = d
commands =
    mypy {toxinidir}/wagtail_links
    coverage erase
    coverage run --branch --source wagtail_links {toxinidir}/sandbox/manage.py test --noinput wagtail_links
    - coverage report -m
